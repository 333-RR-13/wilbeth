pool:
  name: default-k8s-pipelineagents

trigger:
  branches:
    include:
      - main

resources:
  repositories:
    - repository: templates
      name: Common/AzureDevOps.Pipelines.Templates
      type: git
      ref: refs/tags/5.6.5-task-fix-build-container-template.5

variables:
  # Namespace im Cluster: bei AI-Platform erfragen -> <<<NAMESPACE>>>
  # Beispiel: wilbeth-test
  namespace: 'wilbeth'

  # # Azure DevOps Service Connection zu Harbor: bei AI-Platform erfragen -> <<<HARBOR_SERVICE_CONNECTION>>>
  # dockerRegistryServiceConnection: '<<<HARBOR_SERVICE_CONNECTION>>>'

  # Harbor-Projektname: bei AI-Platform erfragen -> <<<HARBOR_PROJEKT>>>
  # Ordner wird erstellt wenn nicht vorhanden
  imageRepository: 'harbor.grenkeleasing.com/ai-platform/wilbeth' 

  # containerRegistry: 'harbor.grenkeleasing.com/wilbeth' #not needed with template

  # ADO-Environment.Resource (vom AI-Platform-Engineer angelegt)
  # Format: <ENVIRONMENT-NAME>.<RESOURCE-NAME>
  k8sEnvironment: 'env-staging-azubi-wilbeth.ai-apps-staging01-wilbeth'

  tag: '$(Build.BuildId)'
  # imageTag MUSS eine Pipeline-Variable sein: replacetokens@6 ersetzt {{imageTag}}
  # aus den Pipeline-Variablen, nicht aus dem task-env-Block (sonst "variable 'imageTag' not found").
  imageTag: '$(Build.BuildId)'


stages:
  # ---------------------------------------------------------------------------
  # Stage 1: Docker-Image bauen und nach Harbor pushen
  # ---------------------------------------------------------------------------
  - stage: BuildWilbethImage
    displayName: 'Build & Push Docker Image'
    jobs:
      - template: jobs/build-container-image.yml@templates
        parameters:
          # Pfad RELATIV zum Repo-Root – Kaniko klont das Repo; ein absoluter Agent-Pfad
          # ($(Build.SourcesDirectory)/...) existiert im Build-Pod nicht. Analog inspo.
          dockerfilePath: "src/Dockerfile"
          imageRepository: $(imageRepository)
          # Genau EIN Tag – das Template hat einen einzelnen TAG-Token; ein mehrzeiliger
          # Wert (… + latest) zerschiesst das Kaniko-Destination-Ziel.
          tag: '$(tag)'

# ============================================
  # STAGE 2: Cleanup Previous Kaniko Job
  # ============================================
  - stage: CleanupKanikoJob
    displayName: 'Cleanup Kaniko Build Job'
    dependsOn: BuildWilbethImage
    condition: succeeded()
    jobs:
      - deployment: CleanupKanikoJob
        displayName: 'Cleanup Kaniko Build Job'
        environment:
          name: container-build-env.tools-prod-container-build-env
          resourceType: Kubernetes
        pool:
          name: default-k8s-pipelineagents
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: none
                - task: Kubernetes@1
                  displayName: 'Delete previous Kaniko job attempt 1'
                  inputs:
                    namespace: "container-build-env"
                    command: "delete"
                    arguments: "job/container-build-job-$(Build.BuildId)-1 --ignore-not-found"
                - task: Kubernetes@1
                  displayName: 'Delete previous Kaniko job attempt 2'
                  inputs:
                    namespace: "container-build-env"
                    command: "delete"
                    arguments: "job/container-build-job-$(Build.BuildId)-2 --ignore-not-found"

  # ============================================
  # STAGE 2b: Diagnose (NUR bei Build-Fehler) – zeigt, warum der Kaniko-Pod nicht startet
  # ============================================
  - stage: DiagnoseBuild
    displayName: 'Diagnose Kaniko Build Pod'
    dependsOn: BuildWilbethImage
    condition: failed()
    jobs:
      - deployment: DiagnoseBuild
        displayName: 'Diagnose Kaniko Build Pod'
        environment:
          name: container-build-env.tools-prod-container-build-env
          resourceType: Kubernetes
        pool:
          name: default-k8s-pipelineagents
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: none
                - task: Kubernetes@1
                  displayName: 'Pods'
                  continueOnError: true
                  inputs:
                    namespace: "container-build-env"
                    command: "get"
                    arguments: "pods -o wide -l job-name=container-build-job-$(Build.BuildId)-1"
                - task: Kubernetes@1
                  displayName: 'Describe Pod (Versuch 1)'
                  continueOnError: true
                  inputs:
                    namespace: "container-build-env"
                    command: "describe"
                    arguments: "pod -l job-name=container-build-job-$(Build.BuildId)-1"
                - task: Kubernetes@1
                  displayName: 'Describe Pod (Versuch 2)'
                  continueOnError: true
                  inputs:
                    namespace: "container-build-env"
                    command: "describe"
                    arguments: "pod -l job-name=container-build-job-$(Build.BuildId)-2"
                - task: Kubernetes@1
                  displayName: 'Events'
                  continueOnError: true
                  inputs:
                    namespace: "container-build-env"
                    command: "get"
                    arguments: "events --sort-by=.lastTimestamp"
                - task: Kubernetes@1
                  displayName: 'Kaniko-Logs (Versuch 1)'
                  continueOnError: true
                  inputs:
                    namespace: "container-build-env"
                    command: "logs"
                    arguments: "job/container-build-job-$(Build.BuildId)-1 --all-containers=true --tail=200"
                - task: Kubernetes@1
                  displayName: 'Kaniko-Logs (Versuch 2)'
                  continueOnError: true
                  inputs:
                    namespace: "container-build-env"
                    command: "logs"
                    arguments: "job/container-build-job-$(Build.BuildId)-2 --all-containers=true --tail=200"

  # ---------------------------------------------------------------------------
  # Stage 3: Deployment auf Test-Cluster (Kustomize + kubectl apply)
  # ---------------------------------------------------------------------------
  - stage: DeployTest
    displayName: 'Deploy Wilbeth Test'
    dependsOn: BuildWilbethImage
    jobs:
      - deployment: DeployWilbeth
        displayName: 'Deploy Wilbeth'
        environment: $(k8sEnvironment)
        # dbPassword wird als Pipeline-Variable (UI / Variable Group) gesetzt und vom
        # replacetokens-Task unten direkt via $(dbPassword) gelesen.
        # KEINE Job-Variable 'dbPassword: $(dbPassword)' -> das wäre ein Zirkelbezug
        # auf sich selbst (cyclical reference) und bricht die Variablen-Auflösung ab.
        pool:
          name: default-k8s-pipelineagents
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - script: |
                    echo "Deploying Wilbeth"
                    echo "Namespace:       $(namespace)"
                    echo "Image:           harbor.grenkeleasing.com/$(imageRepository):$(tag)"
                    echo "K8s Environment: $(k8sEnvironment)"
                  displayName: 'Display deployment info'

                # Platzhalter {{dbPassword}} und {{imageTag}} in den Manifesten
                # durch echte Werte ersetzen (tokenPattern: doublebraces).
                - task: replacetokens@6
                  displayName: 'Replace tokens in Kubernetes manifests'
                  inputs:
                    sources: |
                      $(Build.SourcesDirectory)/k8s/base/secret.yaml
                      $(Build.SourcesDirectory)/k8s/base/deployment.wilbeth.yaml
                    tokenPattern: 'doublebraces'
                    escape: 'off'
                    ifNoFilesFound: 'error'
                    missingVarLog: 'error'
                    telemetryOptout: 'true'
                  env:
                    dbPassword: $(dbPassword)
                    imageTag: $(tag)

                - script: |
                    set -euo pipefail
                    kubectl kustomize . > rendered.yaml
                  displayName: 'Render Kustomize (overlays/test)'
                  workingDirectory: '$(Build.SourcesDirectory)/k8s/overlays/test'

                - script: |
                    set -euo pipefail
                    echo "Rendered resources:"
                    grep -E "kind:|  name:|  namespace:|host:|secretName:|storageClassName:" rendered.yaml || true

                    echo ""
                    echo "Checking for unresolved tokens:"
                    if grep -R "{{.*}}" rendered.yaml; then
                      echo "ERROR: Unresolved tokens found in rendered.yaml"
                      exit 1
                    fi

                    echo ""
                    echo "Checking for unresolved placeholders (<<<...>>>):"
                    if grep -R "<<<.*>>>" rendered.yaml; then
                      echo "ERROR: Unresolved placeholders (<<<...>>>) found in rendered.yaml"
                      exit 1
                    fi
                  displayName: 'Validate rendered manifest'
                  workingDirectory: '$(Build.SourcesDirectory)/k8s/overlays/test'

                - task: Kubernetes@1
                  displayName: 'Apply manifests'
                  inputs:
                    namespace: $(namespace)
                    command: 'apply'
                    arguments: '--validate=false'
                    useConfigurationFile: true
                    configuration: '$(Build.SourcesDirectory)/k8s/overlays/test/rendered.yaml'

                - task: Kubernetes@1
                  displayName: 'Verify Postgres rollout'
                  inputs:
                    namespace: $(namespace)
                    command: 'rollout'
                    arguments: 'status deployment/postgres --timeout=5m'

                - task: Kubernetes@1
                  displayName: 'Verify Wilbeth rollout'
                  inputs:
                    namespace: $(namespace)
                    command: 'rollout'
                    arguments: 'status deployment/wilbeth --timeout=5m'

                - task: Kubernetes@1
                  displayName: 'Show Pods'
                  inputs:
                    namespace: $(namespace)
                    command: 'get'
                    arguments: 'pods -o wide'

                - task: Kubernetes@1
                  displayName: 'Show Services'
                  inputs:
                    namespace: $(namespace)
                    command: 'get'
                    arguments: 'svc'

                - task: Kubernetes@1
                  displayName: 'Show Ingress'
                  inputs:
                    namespace: $(namespace)
                    command: 'get'
                    arguments: 'ingress'
