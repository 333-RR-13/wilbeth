# Falls die Firma eine gemanagte PostgreSQL bereitstellt, diese Datei weglassen
# und DATABASE_URL im Secret auf die externe DB zeigen.
#
# Diese Datei deployt einen einfachen PostgreSQL-Pod (StatefulSet) in-cluster.
# Voraussetzungen: StorageClass <STORAGE_CLASS> muss im Cluster existieren.
---
apiVersion: v1
kind: Service
metadata:
  name: wilbeth-db
  namespace: <NAMESPACE>
  labels:
    app: wilbeth-db
spec:
  clusterIP: None   # headless Service — StatefulSet nutzt stabilen DNS-Namen
  selector:
    app: wilbeth-db
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: wilbeth-db
  namespace: <NAMESPACE>
spec:
  serviceName: wilbeth-db
  replicas: 1
  selector:
    matchLabels:
      app: wilbeth-db
  template:
    metadata:
      labels:
        app: wilbeth-db
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: wilbeth-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wilbeth-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: wilbeth-secrets
                  key: POSTGRES_DB
            # Verhindert Datenverlust bei unordentlichem Shutdown
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "wilbeth"]
            initialDelaySeconds: 10
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: "<STORAGE_CLASS>"
        resources:
          requests:
            storage: 2Gi
