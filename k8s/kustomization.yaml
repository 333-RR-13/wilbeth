# Kustomize-Einstiegspunkt für den tools-test Namespace.
# Aufruf: kubectl apply -k k8s/
#
# Reihenfolge: Secret und Postgres zuerst, dann App.
# secret.example.yaml ist NICHT hier eingebunden (kein echter Secret-Commit!).
# Das Secret muss VOR dem ersten Apply manuell per kubectl/Vault angelegt werden.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: <NAMESPACE>

resources:
  - postgres.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml

# Optionales Image-Override (wird von der Deploy-Pipeline gesetzt):
# images:
#   - name: <HARBOR_REGISTRY>/<HARBOR_PROJECT>/wilbeth
#     newTag: "$(Build.BuildId)"
