# Ingress – abhängig vom Ingress-Controller des Clusters.
# Je nach Cluster-Setup muss diese Datei angepasst oder ersetzt werden:
#   - NGINX Ingress Controller:  annotations wie unten
#   - Traefik:                   andere annotations (traefik.io/...)
#   - OpenShift:                 Route-Objekt statt Ingress verwenden
#   - Gateway API (neu):         HTTPRoute statt Ingress
#
# Die annotations unten sind NGINX-Beispiele — bitte an den tatsächlichen
# Controller anpassen.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wilbeth
  namespace: <NAMESPACE>
  annotations:
    # Beispiel für NGINX Ingress Controller — bei anderem Controller anpassen:
    kubernetes.io/ingress.class: "<INGRESS_CLASS>"
    # nginx.ingress.kubernetes.io/rewrite-target: /
    # Falls TLS via cert-manager:
    # cert-manager.io/cluster-issuer: "<CERT_ISSUER>"
spec:
  # tls:
  #   - hosts:
  #       - <INGRESS_HOST>
  #     secretName: wilbeth-tls
  rules:
    - host: <INGRESS_HOST>
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: wilbeth
                port:
                  number: 80
