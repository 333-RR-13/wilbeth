# NICHT mit echten Credentials committen — als Vorlage gedacht;
# echtes Secret per kubectl/Vault anlegen.
#
# Anleitung:
#   1. Diese Datei NICHT in Git committen (steht in .gitignore, s. k8s/README.md).
#   2. Werte ersetzen und dann einmalig ausführen:
#      kubectl apply -f secret.example.yaml -n <NAMESPACE>
#   3. Für Produktion: Secrets über Vault, Sealed Secrets oder Azure Key Vault beziehen.
apiVersion: v1
kind: Secret
metadata:
  name: wilbeth-secrets
  namespace: <NAMESPACE>
type: Opaque
stringData:
  # Verbindungs-URL für die Wilbeth-App (SQLAlchemy-Format für psycopg v3)
  DATABASE_URL: "postgresql+psycopg://wilbeth:<DB_PASSWORD>@wilbeth-db:5432/wilbeth"

  # PostgreSQL-Credentials für den in-cluster Postgres-Pod (postgres.yaml)
  # Wenn eine gemanagte DB genutzt wird, werden POSTGRES_* hier nicht benötigt,
  # aber DATABASE_URL muss auf die externe DB zeigen.
  POSTGRES_USER: "wilbeth"
  POSTGRES_PASSWORD: "<DB_PASSWORD>"
  POSTGRES_DB: "wilbeth"
