apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Namespace (in azure-pipelines.yml vom Engineer auf 'wilbeth' gesetzt)
namespace: wilbeth

resources:
  - configmap.yaml
  - secret.yaml
  - pvc.yaml
  - deployment.postgres.yaml
  - deployment.wilbeth.yaml
  - service.wilbeth.yaml
  - service.postgres.yaml

labels:
  - includeSelectors: false
    pairs:
      app.kubernetes.io/part-of: wilbeth
