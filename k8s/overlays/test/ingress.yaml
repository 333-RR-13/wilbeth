apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wilbeth-ingress
  annotations:
    # TLS-Redirect erzwingen; Backend ist Plain-HTTP (Port 8080) – kein backend-protocol: HTTPS
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        # Host nach label-studio-Konvention (Cluster ai-apps-staging01).
        # BESTÄTIGEN bei AI-Platform: Wildcard-DNS *.k8s-ai-apps-staging.grenke.com -> Ingress?
        - wilbeth.k8s-ai-apps-staging.grenke.com
      secretName: wilbeth-k8s-ai-apps-staging-tls-secret
  rules:
    - host: wilbeth.k8s-ai-apps-staging.grenke.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: wilbeth
                port:
                  number: 8080

---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  annotations:
    # TODO: spaeter auf die Team-Mailadresse aendern
    metadata.command-issuer.keyfactor.com/Responsible_Team: T-G-DE-IT-OPS-AIP@grenke.de
  name: wilbeth-k8s-ai-apps-staging-tls-cert
  # Namespace wird von kustomization.yaml gesetzt (wilbeth)
spec:
  commonName: wilbeth.k8s-ai-apps-staging.grenke.com
  dnsNames:
    - wilbeth.k8s-ai-apps-staging.grenke.com
  duration: 4320h
  renewBefore: 1440h
  isCA: false
  issuerRef:
    name: keyfactor-command-issuer
    kind: ClusterIssuer
    group: command-issuer.keyfactor.com
  privateKey:
    algorithm: RSA
    encoding: PKCS1
    rotationPolicy: Always
    size: 2048
  secretName: wilbeth-k8s-ai-apps-staging-tls-secret
  subject:
    organizations:
      - GRENKE digital GmbH
    organizationalUnits:
      - AIPlatform
    countries:
      - DE
    localities:
      - Baden-Baden
    provinces:
      - Baden-Wuerttemberg
