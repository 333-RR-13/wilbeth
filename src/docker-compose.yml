services:
  # ── SQLite (default local dev) ──────────────────────────────────────────────
  wilbeth:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - wilbeth_data:/data
    restart: unless-stopped
    # DATABASE_URL defaults to sqlite:////data/wilbeth.db (set in Dockerfile).
    # Uncomment the postgres profile below and set DATABASE_URL to switch to Postgres.

  # ── Postgres variant (optional local dev with Postgres) ────────────────────
  # To use: docker compose --profile postgres up -d --build
  #         then seed: docker compose exec wilbeth-pg python -m seed.seed
  wilbeth-pg:
    profiles: ["postgres"]
    build: .
    ports:
      - "8081:8080"
    environment:
      DATABASE_URL: "postgresql+psycopg://wilbeth:wilbeth_dev@db:5432/wilbeth"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    profiles: ["postgres"]
    image: postgres:16
    environment:
      POSTGRES_USER: wilbeth
      POSTGRES_PASSWORD: wilbeth_dev
      POSTGRES_DB: wilbeth
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wilbeth"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  wilbeth_data:
  postgres_data:
